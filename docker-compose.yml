version: '3.8'

services:
  db:
    build: . 
    container_name: postgres_todo
    restart: always 
    ports:
      - 5432:5432
    volumes:
      - db-store:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    env_file:
      - .env
    
volumes:
  db-store: